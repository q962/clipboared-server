name: App

on: push

defaults:
  run:
    shell: msys2 {0}

jobs:
  windows-and-android:
    runs-on: windows-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "npm"
          cache-dependency-path: web
      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-7zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-MinHook
            mingw-w64-x86_64-xmake
            mingw-w64-x86_64-lua-luarocks
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-imagemagick
            mingw-w64-x86_64-luajit
            git
          path-type: inherit

      - run: luarocks install penlight
        # shell: msys2 {0}

      - run: xmake -vD && xmake install -o build/OUT
        # shell: msys2 {0}

      - run: mkdir artifacts

      - name: Check for changes in web/
        run: |
          CHANGES=$(git diff --name-only HEAD~1 HEAD | grep -q '^web/' && echo "true" || echo "false")
          echo "web_changed=$CHANGES" >> $GITHUB_ENV

      - if: env.web_changed == 'true'
        run: >
          npm run build-app || exit 1

          npx cap sync || exit 1

          echo "$KEYSTORE_BASE64" | base64 --decode > android/app.keystore

          npx cap build android
           --keystorepath app.keystore
           --keystorepass $KEYSTORE_PASSWORD
           --keystorealias $KEY_ALIAS
           --keystorealiaspass $KEY_PASSWORD || exit 1

          cp android/app/build/outputs/apk/release/app-release-signed.apk ../artifacts/app.apk
        working-directory: web
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - run: |
          7z a artifacts/windows.7z ./build/OUT/.

      - uses: actions/upload-artifact@v4
        with:
          name: windows-and-android
          path: artifacts/*

  Upload:
    runs-on: ubuntu-latest
    needs: windows-and-android
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
